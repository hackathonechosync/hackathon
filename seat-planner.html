<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seat Planner</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/seat-planner.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<nav>

    <div class="logo">

        <i class="fa-solid fa-shield-halved"></i>

        <h2>Anti-Kuddus Protocol</h2>

    </div>

    <ul class="nav-links">

        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="complaint.html">Complaint</a></li>
        <li><a href="seat-planner.html">Seat Planner</a></li>
        <li><a href="sos.html">SOS</a></li>

    </ul>

    <a href="index.html" class="login-btn">Logout</a>

</nav>

<section class="planner">

    <h1>Smart Seat Planner</h1>

    <p>
        Students are automatically arranged according to height.
    </p>

    <!-- Add Student -->

    <form id="studentForm">

        <input
            type="text"
            id="studentName"
            placeholder="Student Name"
            required>

        <input
            type="number"
            id="studentHeight"
            placeholder="Height (cm)"
            required>

        <button type="submit">

            Add Student

        </button>

    </form>

    <!-- Search -->

    <div class="toolbar">

        <input
            type="text"
            id="searchStudent"
            placeholder="🔍 Search Student">

    </div>

    <!-- Student Table -->

    <table>

        <thead>

            <tr>

                <th>Seat</th>
                <th>Name</th>
                <th>Height</th>
                <th>Edit</th>
                <th>Delete</th>

            </tr>

        </thead>

        <tbody id="studentTable">

        </tbody>

    </table>

    <!-- Classroom -->

    <h2>Classroom Layout</h2>

    <div class="teacher">

        👨‍🏫 Teacher

    </div>

    <div
        id="classroom"
        class="classroom">

    </div>

</section>

<script src="js/seat-planner.js"></script>

</body>

</html>
