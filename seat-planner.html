<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Planner</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/seat-planner.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<nav>

    <div class="logo">
        <h2>Anti-Kuddus Protocol</h2>
    </div>

    <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="complaint.html">Complaint</a></li>
        <li><a href="seat-planner.html">Seat Planner</a></li>
    </ul>

</nav>

<section class="planner">

    <h1>Smart Seat Planner</h1>

    <form id="studentForm">

        <input
            type="text"
            id="studentName"
            placeholder="Student Name"
            required>

        <input
            type="number"
            id="studentHeight"
            placeholder="Height (cm)"
            required>

        <button type="submit">

            Add Student

        </button>

    </form>
    <input
    type="text"
    id="searchStudent"
    placeholder="🔍 Search Student...">

    <h2>Seat Allocation</h2>

    <table>

       <thead>
            <tr>
                <th>Name</th>
                <th>Height</th>
                <th>Seat Position</th>
                <th>Delete</th>
                <th>Edit</th>
            </tr>
        </thead>

        <tbody id="seatTable">

        </tbody>

    </table>
    <h2>Classroom Layout</h2>

<div id="classroom" class="classroom"></div>
<div class="teacher-desk">
    👨‍🏫 Teacher's Desk
</div>

<div class="board">
    🖥️ WHITEBOARD
</div>

</section>

<script src="js/seat-planner.js"></script>

</body>
</html>
