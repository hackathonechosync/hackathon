<!-- ==========================
     Complaint Section
========================== -->


<section class="container">


<div class="card">


<h1>

<i class="fa-solid fa-file-circle-exclamation"></i>

Submit Anonymous Complaint

</h1>



<p>

Your complaint will be recorded securely.

</p>






<form id="complaintForm">





<!-- Category -->


<label>

Complaint Category

</label>



<select

id="category"

required>


<option value="">

Select Category

</option>



<option>

Harassment

</option>



<option>

Academic Issue

</option>



<option>

Teacher Issue

</option>



<option>

Classroom Problem

</option>



<option>

Other

</option>



</select>








<!-- Priority -->


<label>

Priority Level

</label>



<select

id="priority"

required>



<option>

Low

</option>


<option>

Medium

</option>


<option>

High

</option>



</select>







<!-- Description -->


<label>

Complaint Description

</label>



<textarea

id="description"

placeholder="Write your complaint here..."

required></textarea>








<!-- File Upload -->


<label>

Upload Evidence (Image/PDF)

</label>



<input

type="file"

id="file"

accept="image/*,.pdf">







<!-- Submit -->


<button

type="submit"

class="btn">


<i class="fa-solid fa-paper-plane"></i>


Submit Complaint


</button>




</form>



</div>


</section>









<!-- Toast -->


<div id="toast" class="toast"></div>







<!-- JavaScript -->


<script src="js/utils.js"></script>
